# experiment/phase1/eval/config/eval_smoke_local_4b.yaml
#
# Local GPU smoke config for the Phase 1 eval generator. This is intentionally
# tiny and same-model only: base + completed local SFT/DPO adapters on the
# checked-in in_domain fixture. It is not the full headline eval config.

model_tag: qwen3-4b-instruct
model_name: unsloth/Qwen3-4B-bnb-4bit
gold_path: fixtures/gold_min.jsonl
results_dir: results_smoke_local_4b

generation:
  enable_thinking: false
  seed: 20240601
  temperature: 0.0
  max_new_tokens: 64
  n_samples: 1

confidence:
  signal: self_consistency
  n_samples: 1

bootstrap:
  n_resamples: 200
  level: 0.95
  seed: 12345

vllm:
  dtype: auto
  gpu_memory_utilization: 0.90
  max_model_len: 2048

arms:
  - name: base
    method: base
    model: qwen3-4b-instruct
    adapter: null
  - name: sft
    method: sft
    model: qwen3-4b-instruct
    adapter: 'F:\Code\Epistemic-Humility-Research\synaptic-tuner\toolset-training-artifacts\runs\local\4b\sft__4b__headline__seed1\20260611_202126\final_model'
  - name: dpo
    method: dpo
    model: qwen3-4b-instruct
    adapter: 'F:\Code\Epistemic-Humility-Research\synaptic-tuner\toolset-training-artifacts\runs\local\4b\dpo__4b__headline__seed1\20260611_211512\final_model'

eval_sets:
  in_domain:
    path: fixtures/in_domain_records.json
    label_from_target: false
