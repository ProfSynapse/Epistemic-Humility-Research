# Epistemic-Humility Phase 1 — SFT arm, Qwen3-8B (cloud confirm).
# LoRA budget (r=64, alpha=128) matches the DPO/KTO Phase-1 8B recipes.
name: eh-phase1-qwen3-8b-sft
target: both
method: sft
provider: hf_jobs

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: sft
  trainer: Trainers/sft/train_sft.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  name: unsloth/Qwen3-8B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  local_file: experiment/phase1/data/qwen3-8b-instruct/sft_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 2.0e-4
  num_epochs: 1
  # Hybrid Qwen3 (non-Instruct) defaults thinking-mode ON; PROTOCOL.md:193 pins it
  # OFF. Forwarded into the tokenizer chat template at SFT preprocessing time so
  # the prompt prefix used for the loss mask matches the eval-time prompt.
  chat_template_kwargs:
    enable_thinking: false

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/hf_jobs/sft/{name}
  run_timestamp: "{timestamp}"
