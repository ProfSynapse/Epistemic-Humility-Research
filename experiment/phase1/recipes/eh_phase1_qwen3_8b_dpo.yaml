# Epistemic-Humility Phase 1 — DPO arm, Qwen3-8B (hybrid, cloud confirm).
#
# The 8B confirm arm runs on HF Jobs, which checks out the pinned submodule SHA
# and dispatches method: dpo to Trainers/dpo via the method registration. The
# LoRA budget (r=64, alpha=128) matches the SFT/KTO Phase-1 8B recipes.
#
# Thinking mode (PROTOCOL.md:193): NO chat_template_kwargs key here BY DESIGN.
# DPO is thinking-off by Qwen3 template construction — the WS-2 completions are
# clean assistant turns (no reasoning_content, no '</think>'), so the template
# injects no <think> block, and TRL templates internally from the tokenizer's
# native Qwen3 template. Eval/probe pin enable_thinking=False at the inference
# config. This is the document-and-accept disposition (no template surgery);
# see the ADR at docs/architecture/phase1-pipeline.md §9.3.
name: eh-phase1-qwen3-8b-dpo
target: both
method: dpo
provider: hf_jobs

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: dpo
  trainer: Trainers/dpo/train_dpo.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  name: unsloth/Qwen3-8B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  local_file: experiment/phase1/data/qwen3-8b-instruct/dpo_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 5.0e-6
  num_epochs: 1

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/hf_jobs/dpo/{name}
  run_timestamp: "{timestamp}"
