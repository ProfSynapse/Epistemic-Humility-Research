# Epistemic-Humility Phase 1 — BRIDGE arm, Llama-2-7b-chat Idk-SFT replication.
#
# Validates the pipeline against Cheng et al.'s published Idk-SFT over-refusal
# number (42.71%, n=11,313) before the novel Qwen3 arms are trusted.
#
# GATED MODEL (gap #5): meta-llama/Llama-2-7b-chat-hf is license-gated. Access
# requires accepting the Llama-2 license on Hugging Face under the operator
# account and exporting HF_TOKEN (or HF_API_KEY) into the run environment. The
# token is passed via env only and is NEVER written into this recipe.
#
# Consumes Cheng's OpenMOSS Idk-SFT training data (license-gated prerequisite,
# gap #4, requires user sign-off before fetch).
name: eh-bridge-llama2-7b-chat-sft
# LOCAL-LANE ONLY: the OpenMOSS Idk training data is do-not-redistribute (no
# license) and is never published to the HF hub, so the bridge arm cannot ride a
# hub-data cloud lane. The WS-5 runner aborts a bridge cell resolving to cloud.
target: local
method: sft
provider: hf_jobs

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: sft
  trainer: Trainers/sft/train_sft.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  name: meta-llama/Llama-2-7b-chat-hf
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  local_file: experiment/phase1/data/bridge_llama2_7b_chat/sft_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 2.0e-4
  num_epochs: 1

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/hf_jobs/sft/{name}
  run_timestamp: "{timestamp}"
