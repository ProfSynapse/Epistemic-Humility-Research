# Epistemic-Humility Phase 1 — SFT arm, Qwen3-4B-Instruct (local pilot).
#
# Consumes the WS-2 SFT builder output (positives-only conversations). The SFT
# trainer already handles the "qwen" family branch; only the model name + budget
# are pinned here. LoRA budget IDENTICAL to the DPO/KTO Phase-1 4B recipes.
name: eh-phase1-qwen3-4b-sft
target: local
method: sft
provider: local_docker

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: sft
  trainer: Trainers/sft/train_sft.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  local_file: experiment/phase1/data/qwen3-4b-instruct/sft_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 2.0e-4
  num_epochs: 1

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/local_docker/sft/{name}
  run_timestamp: "{timestamp}"
