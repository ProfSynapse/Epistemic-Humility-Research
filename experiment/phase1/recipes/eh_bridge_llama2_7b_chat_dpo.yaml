# Epistemic-Humility Phase 1 — BRIDGE arm, Llama-2-7b-chat Idk-DPO replication.
#
# Validates the pipeline against Cheng et al.'s published Idk-DPO over-refusal
# number (23.27%, n=11,313) before the novel Qwen3 arms are trusted.
#
# GATED MODEL (gap #5): meta-llama/Llama-2-7b-chat-hf is license-gated. Access
# requires (a) accepting the Llama-2 license on Hugging Face under the operator
# account, and (b) exporting a valid HF_TOKEN (or HF_API_KEY) into the run
# environment. The token is passed via env only and is NEVER written into this
# recipe. The trainer reads it from HF_TOKEN/HF_API_KEY (or --hf-token).
#
# This bridge arm consumes Cheng's OpenMOSS Idk training data, which is itself a
# license-gated CODE prerequisite (gap #4) requiring user sign-off before fetch.
name: eh-bridge-llama2-7b-chat-dpo
target: both
method: dpo
provider: hf_jobs

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: dpo
  trainer: Trainers/dpo/train_dpo.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  # Gated; override by name (no friendly preset exists for Llama-2-7b-chat).
  name: meta-llama/Llama-2-7b-chat-hf
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  # Cheng Idk-DPO training data (OpenMOSS); license-gated prerequisite (gap #4).
  local_file: experiment/phase1/data/bridge_llama2_7b_chat/dpo_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 5.0e-6
  num_epochs: 1

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/hf_jobs/dpo/{name}
  run_timestamp: "{timestamp}"
