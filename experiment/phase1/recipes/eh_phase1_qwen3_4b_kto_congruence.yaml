# Epistemic-Humility Phase 1 — KTO arm (congruence mapping, primary),
# Qwen3-4B (hybrid, local pilot).
#
# Consumes the WS-2 KTO congruence builder output (interleaved T/F/T/F binary).
# LoRA budget IDENTICAL to the SFT and DPO Phase-1 4B recipes.
#
# Thinking mode (PROTOCOL.md:193): NO chat_template_kwargs key here BY DESIGN.
# KTO is thinking-off by Qwen3 template construction — the WS-2 completions are
# clean assistant turns (no reasoning_content, no '</think>'), so the template
# injects no <think> block, and TRL templates internally from the tokenizer's
# native Qwen3 template. Eval/probe pin enable_thinking=False at the inference
# config. This is the document-and-accept disposition (no template surgery);
# see the ADR at docs/architecture/phase1-pipeline.md §9.3.
name: eh-phase1-qwen3-4b-kto-congruence
target: local
method: kto
provider: local_docker

job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false

setup:
  pip:
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

# Purely declarative: the WS-5 runner owns command construction + per-cell data
# staging; dataset.local_file is a staging placeholder it rewrites. See
# experiment/phase1/recipes/README.md.
model:
  name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true

dataset:
  local_file: experiment/phase1/data/qwen3-4b-instruct/kto_congruence_train.jsonl

training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 1.0e-6
  num_epochs: 1

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/local_docker/kto/{name}
  run_timestamp: "{timestamp}"
