name: dpo-4b-headline-seed1
target: local
method: dpo
provider: local_docker
job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false
setup:
  pip:
  - trl==0.22.2
  - git+https://github.com/unslothai/unsloth_zoo.git
  - git+https://github.com/unslothai/unsloth.git
  copy:
  - Trainers/dpo
  - Trainers/shared
  - shared
  - tuner
  - scratch/eh_staging/dpo__4b__headline__seed1/dpo_train.jsonl
model:
  name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true
dataset:
  local_file: scratch/eh_staging/dpo__4b__headline__seed1/dpo_train.jsonl
training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 5.0e-06
  num_epochs: 1
  seed: 1
lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
artifacts:
  output_root: toolset-training-artifacts/runs/local/4b/dpo__4b__headline__seed1
  run_timestamp: '{timestamp}'
run:
  method: dpo
  trainer: Trainers/dpo/train_dpo.py
