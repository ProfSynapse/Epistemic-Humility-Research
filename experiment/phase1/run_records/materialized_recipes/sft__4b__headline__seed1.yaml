name: sft-4b-headline-seed1
target: local
method: sft
provider: local_docker
job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: false
setup:
  pip:
  - trl==0.22.2
  - git+https://github.com/unslothai/unsloth_zoo.git
  - git+https://github.com/unslothai/unsloth.git
  copy:
  - Trainers/sft
  - Trainers/shared
  - shared
  - tuner
  - scratch/eh_staging/sft__4b__headline__seed1/sft_train.jsonl
run:
  method: sft
  trainer: Trainers/sft/train_sft.py
  dry_run: false
  dashboard: false
  quiet: true
model:
  name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true
dataset:
  local_file: scratch/eh_staging/sft__4b__headline__seed1/sft_train.jsonl
training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 0.0002
  num_epochs: 1
  chat_template_kwargs:
    enable_thinking: false
  seed: 1
lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
artifacts:
  output_root: toolset-training-artifacts/runs/local/4b/sft__4b__headline__seed1
  run_timestamp: '{timestamp}'
