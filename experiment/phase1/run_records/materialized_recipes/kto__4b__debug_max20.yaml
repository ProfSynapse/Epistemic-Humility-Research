name: kto-4b-debug-max20
target: local
method: kto
provider: local_docker
job:
  image: unsloth/unsloth:latest
  pull_policy: missing
  transfer: auto
  keep_container: true
setup:
  pip:
  - trl==0.22.2
  - git+https://github.com/unslothai/unsloth_zoo.git
  - git+https://github.com/unslothai/unsloth.git
  copy:
  - Trainers/kto
  - Trainers/shared
  - shared
  - tuner
  - scratch/eh_staging/kto__4b__headline__seed1/kto_congruence_train.jsonl
model:
  name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true
dataset:
  local_file: scratch/eh_staging/kto__4b__headline__seed1/kto_congruence_train.jsonl
training:
  batch_size: 2
  gradient_accumulation: 4
  learning_rate: 1.0e-06
  num_epochs: 1
  max_steps: 20
  seed: 1
lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
artifacts:
  output_root: toolset-training-artifacts/runs/local/4b/kto__4b__debug_max20
  run_timestamp: '20260612_0405_patch20'
  host_path: toolset-training-artifacts/runs/local/4b/kto__4b__debug_max20/20260612_0405_patch20
  container_path: /workspace/repo/toolset-training-artifacts/runs/local/4b/kto__4b__debug_max20/20260612_0405_patch20
run:
  command:
  - bash
  - -lc
  - python -c "from pathlib import Path; p=Path('train_kto.py'); s=p.read_text(); p.write_text(s.replace('import time\n', 'import time\nimport logging\n', 1))" && python train_kto.py --model-name unsloth/Qwen3-4B-bnb-4bit --max-seq-length 2048 --local-file ../../scratch/eh_staging/kto__4b__headline__seed1/kto_congruence_train.jsonl --batch-size 2 --gradient-accumulation 4 --learning-rate 1e-06 --seed 1 --num-epochs 1 --max-steps 20 --lora-r 32 --lora-alpha 64 --lora-dropout 0.05 --lora-target-modules q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj --output-root ../../toolset-training-artifacts/runs/local/4b/kto__4b__debug_max20 --run-timestamp 20260612_0405_patch20 --debug
  workdir: /workspace/repo/Trainers/kto
